name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment label (for artifact naming only)
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  predeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: CI pre-deploy gate
        run: npm run ci:check
        env:
          CI: true

  build:
    runs-on: ubuntu-latest
    needs: predeploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Verify dist artifact
        run: node scripts/verify-production-dist.mjs
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: finely-cred-dist-${{ inputs.environment }}
          path: dist/
          retention-days: 14
