name: Lead Intel Hourly Dry Run
on:
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'
jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python scripts/lead_intel/swarm_enqueue.py --dry-run
