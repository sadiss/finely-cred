name: CMO Overnight Dry Run
on:
  workflow_dispatch:
  schedule:
    - cron: '5 10 * * *'
jobs:
  overnight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python scripts/orchestrator.py --dry-run
